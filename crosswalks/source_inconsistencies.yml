# Verified arithmetic errors INSIDE the official source PDF.
#
# In each case the extracted line items are correct — they were confirmed by
# summing the document's own printed line items by hand — but the document's
# printed TOTAL disagrees. This is an error in the official budget book, not a
# parser bug (the BetaNYC methodology hit two of these in the NYC budget).
#
# A disposition only suppresses a FAIL when the printed total AND the extracted
# sum still match the verified values below. If the parser ever changes those
# numbers, the discrepancy resurfaces as a FAIL rather than being hidden.

